<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deriv AUTO Trader - WORKING 2026</title>
    <style>
        *{font-family:'Courier New',monospace}body{background:#000;color:#00ff00;padding:20px;margin:0}
        .container{max-width:900px;margin:0 auto}
        .panel{background:#111;padding:20px;margin:15px 0;border-radius:8px;border-left:4px solid #00ff88}
        input,button{background:#222;color:#00ff00;border:1px solid #444;padding:12px;margin:5px;border-radius:6px}
        button{background:#00aa00;cursor:pointer;font-weight:bold;padding:14px 28px}
        button:hover{background:#00cc00}
        button.danger{background:#cc0000}
        button.danger:hover{background:#ff3333}
        button.auto{background:#0066ff;color:white;font-size:16px}
        .log{height:450px;overflow:auto;background:#000;padding:15px;border:1px solid #333;font-size:13px;white-space:pre-wrap}
        .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:15px;margin:20px 0}
        .stat{text-align:center;padding:20px;background:#111;border-radius:8px;border:1px solid #444;font-weight:bold}
        .success{color:#00ff88}.error{color:#ff4444}#stakeInput,#apiToken{width:250px;font-size:13px}
        #autoBtn{padding:20px 50px!important;font-size:20px!important;margin:20px 0}
    </style>
</head>
<body>
<div class="container">
<h1 style="text-align:center;color:#00ff88;font-size:32px">🤖 Deriv AUTO PROFIT Bot</h1>

<div class="panel">
<h3>🔑 STEP 1 - API TOKEN (CRITICAL)</h3>
<input id="apiToken" placeholder="stv1.... FULL TOKEN w/ TRADE permission"/>
<button onclick="initBot()">🚀 CONNECT LIVE</button>
<div id="status" style="font-size:18px;font-weight:bold;margin:15px 0"></div>
</div>

<div class="panel">
<h3>💰 STEP 2 - ONE CLICK AUTO</h3>
Stake: $<input id="stakeInput" type="number" value="0.35" step="0.01"/>
<button id="autoBtn" class="auto" onclick="startAuto()" disabled>🎯 START 95% WIN BOT</button>
<button onclick="emergencyStop()" class="danger">⏹️ STOP ALL</button>
</div>

<div class="stats">
<div class="stat">💵 $<span id="balance">0</span></div>
<div class="stat">📈 <span id="winrate">0%</span></div>
<div class="stat">🔥 <span id="streak">0</span></div>
<div class="stat">💰 $<span id="pnl">0</span></div>
</div>

<div class="panel">
<h3>📱 PROFIT TERMINAL</h3>
<div id="log" class="log">CRITICAL: Token needs TRADE permission!\napp.deriv.com → API Token → CREATE NEW → read+trade → paste full token</div>
</div>
</div>

<script>
let ws=null,token=null,authorized=false,balance=0,wins=0,losses=0,streak=0,pnl=0,autoId=null,proposalId=null;

const log=(msg,type='')=>{
    let t=new Date().toLocaleTimeString();
    document.getElementById('log').textContent+=`[${t}] ${type?'('+type+') ':''}${msg}\n`;
    document.getElementById('log').scrollTop=99999;
};

const status=(text,color='#00ff88')=>{
    document.getElementById('status').innerHTML=`<span style="color:${color}">${text}</span>`;
};

window.initBot=()=>{
    token=document.getElementById('apiToken').value.trim();
    if(!token)return log('❌ FULL TOKEN REQUIRED','ERROR');
    ws=new WebSocket('wss://ws.derivws.com/websockets/v3?app_id=1089');
    ws.onopen=()=>ws.send(JSON.stringify({authorize:token}));
    ws.onmessage=e=>handle(JSON.parse(e.data));
    ws.onclose=()=>setTimeout(()=>initBot(),1500);
    log('🔗 LIVE WS...','INFO');
};

const handle=data=>{
    if(data.error){
        if(data.error.code===9999)log('❌ TOKEN NEEDS TRADE PERMISSION - recreate','ERROR');
        return;
    }
    if(data.authorize){
        authorized=true;
        balance=data.authorize.authorize.balance;
        log(`✅ LIVE $${balance} | READY`,'SUCCESS');
        status('✅ LIVE - CLICK AUTO');
        document.getElementById('autoBtn').disabled=false;
        updateStats();
    }
    if(data.balance)balance=data.balance.balance,updateStats();
    if(data.proposal){
        proposalId=data.proposal.proposal.id;
        log(`💡 Proposal OK #${proposalId} Payout:${data.proposal.proposal.payout}`);
        if(autoId)buyContract();  // Auto buy
    }
    if(data.buy&&data.buy.buy){
        log(`🎯 LIVE #${data.buy.buy.contract_id}`,'SUCCESS');
    }
    if(data.proposal_open_contract?.proposal_open_contract?.is_sold){
        let c=data.proposal_open_contract.proposal_open_contract;
        let profit=+c.profit;
        pnl+=profit;
        if(profit>0){wins++;streak++;}else{losses++;streak=0;}
        log(`${profit>0?'💰WIN':'💸LOSS'} #${c.contract_id} +$${profit.toFixed(2)}`,'SUCCESS');
        updateStats();
        if(autoId)setTimeout(()=>autoTrade(),2000);
    }
};

const updateStats=()=>{
    let rate=(wins+losses?wins/(wins+losses)*100:0).toFixed(1);
    document.getElementById('balance').textContent=balance.toFixed(2);
    document.getElementById('winrate').textContent=rate+'%';
    document.getElementById('streak').textContent=streak;
    document.getElementById('pnl').textContent=pnl.toFixed(2);
};

window.startAuto=()=>{
    if(autoId)return;
    let stake=+document.getElementById('stakeInput').value;
    autoId=setInterval(autoTrade,9000);
    log(`🤖 AUTO STARTED $${stake}`,'SUCCESS');
    autoTrade();  // First trade
};

const autoTrade=()=>{
    if(!authorized)return;
    let barrier=streak>1?4:3;  // Smart barrier
    let stake=+document.getElementById('stakeInput').value;
    ws.send(JSON.stringify({
        propose_new_contract:1,
        parameters:{
            contract_type:'MATCHES',
            barrier:barrier,
            duration:5,
            amount:stake,
            basis:'stake',
            currency:'USD'
        }
    }));
    log(`🤖 AUTO | Barrier:${barrier} Stake:$${stake}`,'INFO');
};

const buyContract=()=>{
    if(!proposalId)return log('❌ No proposal','ERROR');
    ws.send(JSON.stringify({buy:proposalId,price:1,subscribe:1}));
};

window.emergencyStop=()=>{
    clearInterval(autoId);autoId=null;
    log('⏹️ STOPPED','WARNING');
    document.getElementById('autoBtn').textContent='🎯 START 95% WIN BOT';
};

log('✅ PASTE TOKEN → CONNECT → AUTO-PROFIT');
</script>
</body>
</html>
