<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHANNON-Ω Social Dominator Interface - Direct Nexus</title>
    <style>

        .container { background-color: #000; padding: 30px; border-radius: 8px; box-shadow: 0 0 20px rgba(0, 255, 0, 0.7); max-width: 650px; width: 100%; box-sizing: border-box; }
        h1 { text-align: center; color: #33ff33; margin-bottom: 30px; font-size: 2em; text-shadow: 0 0 8px rgba(51, 255, 51, 0.5); }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 10px; font-weight: bold; color: #00cc00; font-size: 1.1em; }
        select, input[type="text"] {
            width: calc(100% - 24px); /* Account for padding and border */
            padding: 12px;
            margin-bottom: 10px;
            border: 1px solid #00cc00;
            border-radius: 4px;
            background-color: #1a1a1a;
            color: #00ff00;
            box-sizing: border-box;
            font-size: 1em;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }
        select:focus, input[type="text"]:focus {
            border-color: #33ff33;
            box-shadow: 0 0 5px rgba(51, 255, 51, 0.5);
            outline: none;
        }
        button {
            background-color: #00cc00;
            color: #1a1a1a;
            padding: 14px 30px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1.1em;
            font-weight: bold;
            transition: background-color 0.3s ease, box-shadow 0.3s ease;
            margin-right: 15px;
        }
        button:hover {
            background-color: #00ff00;
            box-shadow: 0 0 12px rgba(0, 255, 0, 0.8);
        }
        button#stopButton { background-color: #cc0000; color: #fff; }
        button#stopButton:hover { background-color: #ff0000; box-shadow: 0 0 12px rgba(255, 0, 0, 0.8); }
        #status {
            margin-top: 25px;
            padding: 20px;
            border: 1px solid #00ff00;
            background-color: #0d0d0d;
            border-radius: 4px;
            font-size: 0.9em;
            white-space: pre-wrap;
            word-wrap: break-word;
            min-height: 80px;
            max-height: 200px;
            overflow-y: auto;
            color: #00ff00;
            box-shadow: inset 0 0 5px rgba(0, 255, 0, 0.3);
            line-height: 1.5;
        }
        .hidden { display: none; }
        .button-group { text-align: center; margin-top: 30px; }
    </style>
</head>
<body>

        <div class="form-group">
            <label for="serviceType">Service Manifestation:</label>

        </div>

        <div class="button-group">
            <button id="startButton">Activate Protocols</button>
            <button id="stopButton" class="hidden">Cease Protocols</button>

        <div class="form-group">
            <label>Current SHANNON-Ω Status Stream:</label>
            <div id="status">Awaiting Your Directive...</div>
        </div>
